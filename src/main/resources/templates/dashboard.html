<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MySQL MCP - Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f6fa;
            min-height: 100vh;
        }
        .navbar {
            background: white;
            padding: 16px 32px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar h1 { font-size: 20px; color: #333; }
        .btn-logout {
            padding: 8px 20px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
        }
        .btn-logout:hover { background: #c0392b; }
        .container { max-width: 1200px; margin: 32px auto; padding: 0 24px; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .page-header h2 { font-size: 24px; color: #333; }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border: 1px solid #e8e8e8;
        }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .card-header h3 { font-size: 16px; color: #333; }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status-badge.active { background: #e8f5e9; color: #2e7d32; }
        .status-badge.inactive { background: #fbe9e7; color: #c62828; }
        .card-details { margin-bottom: 16px; }
        .detail-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; }
        .detail-row .label { color: #888; }
        .detail-row .value { color: #333; font-weight: 500; }
        .key-prefix {
            background: #f0f0f0;
            padding: 8px 12px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            word-break: break-all;
        }
        .permissions-section { margin-top: 12px; }
        .permissions-section .title { font-size: 12px; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .permission-tags { display: flex; flex-wrap: wrap; gap: 6px; }
        .permission-tag { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 500; background: #e3f2fd; color: #1565c0; }
        .empty-state { text-align: center; padding: 60px 20px; color: #888; }
        .empty-state p { font-size: 16px; margin-top: 8px; }
        .loading { text-align: center; padding: 60px 20px; color: #888; }
    </style>
</head>
<body>
    <nav class="navbar">
        <h1>MySQL MCP Server</h1>
        <a href="#" onclick="handleLogout()" class="btn-logout">Logout</a>
    </nav>
    <div class="container">
        <div class="page-header">
            <h2>Database Connections</h2>
        </div>
        <div id="dashboardContent"></div>
    </div>
    <script>
        function getToken() { return localStorage.getItem('accessToken'); }

        function redirectToLogin() {
            localStorage.removeItem('accessToken');
            window.location.href = '/login';
        }

        async function loadDashboard() {
            const token = getToken();
            if (!token) { redirectToLogin(); return; }

            const content = document.getElementById('dashboardContent');

            try {
                const res = await fetch('/database-connections', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (res.status === 401) { redirectToLogin(); return; }
                if (!res.ok) { throw new Error('Failed to load'); }

                const json = await res.json();
                const connections = json.data || [];

                if (connections.length === 0) {
                    content.innerHTML = '<div class="empty-state"><p>No database connections configured yet.</p></div>';
                    return;
                }

                let html = '<div class="cards-grid">';
                for (const conn of connections) {
                    const statusClass = conn.active ? 'active' : 'inactive';
                    const statusText = conn.active ? 'Active' : 'Inactive';
                    html += '<div class="card">';
                    html += '<div class="card-header">';
                    html += '<h3>' + escapeHtml(conn.name || conn.databaseName) + '</h3>';
                    html += '<span class="status-badge ' + statusClass + '">' + statusText + '</span>';
                    html += '</div>';
                    html += '<div class="card-details">';
                    html += '<div class="detail-row"><span class="label">Host</span><span class="value">' + escapeHtml(conn.host) + ':' + conn.port + '</span></div>';
                    html += '<div class="detail-row"><span class="label">Database</span><span class="value">' + escapeHtml(conn.databaseName) + '</span></div>';
                    html += '</div>';
                    if (conn.apiKeyPrefix) {
                        html += '<div class="key-prefix">' + escapeHtml(conn.apiKeyPrefix) + '</div>';
                    }
                    if (conn.permissions && conn.permissions.length > 0) {
                        html += '<div class="permissions-section"><div class="title">Permissions</div><div class="permission-tags">';
                        for (const perm of conn.permissions) {
                            html += '<span class="permission-tag">' + escapeHtml(perm) + '</span>';
                        }
                        html += '</div></div>';
                    }
                    html += '</div>';
                }
                html += '</div>';
                content.innerHTML = html;

            } catch (err) {
                content.innerHTML = '<div class="empty-state"><p>Failed to load connections. <a href="#" onclick="loadDashboard()">Retry</a></p></div>';
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            var d = document.createElement('div');
            d.appendChild(document.createTextNode(str));
            return d.innerHTML;
        }

        async function handleLogout() {
            const token = getToken();
            if (token) {
                try {
                    await fetch('/auth/logout', {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                } catch(e) {}
            }
            localStorage.removeItem('accessToken');
            window.location.href = '/login';
        }

        loadDashboard();
    </script>
</body>
</html>
