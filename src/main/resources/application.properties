spring.application.name=MySqlMCP

# Server port - can be overridden via SPRING_SERVER_PORT environment variable
# Example: java -jar app.jar --server.port=9090
server.port=8081

# DB config - Application Database
# These can be overridden via environment variables or command line arguments:
#   SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
# Example: java -jar app.jar --spring.datasource.url=jdbc:mysql://localhost:3306/mydb
spring.datasource.url=jdbc:mysql://localhost:3306/mysql_mcp?serverTimezone=Asia/Kolkata
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Encryption key for target database passwords (AES-256-GCM, 32 bytes Base64-encoded)
# Generate a new key with: openssl rand -base64 32
mysql-mcp.encryption.key=RkR9jz4v7r0lN2rWmL6w2S7rV0y7DkJ6jQ2m3dF1o8Q=

mysql-mcp.auth.username=admin
mysql-mcp.auth.password=admin123

# JWT secret for access tokens
mysql-mcp.jwt.secret=dGhpcyBpcyBhIHNlY3JldCBrZXkgZm9yIEpXVCB0b2tlbiBtdXN0IGJlIDMyIGJ5dGVz

# Security defaults - server-wide master switches.
mysql-mcp.security.enable-write-operations=false
mysql-mcp.security.enable-ddl-operations=false

# Runtime protections applied to every query executed against a target database.
mysql-mcp.query.timeout-seconds=10
mysql-mcp.query.max-rows=1000
mysql-mcp.query.max-length=10000

# MCP properties
spring.ai.mcp.server.name=mysql-mcp-server
spring.ai.mcp.server.version=0.0.1
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.stdio=false
spring.ai.mcp.server.protocol=STREAMABLE
spring.ai.mcp.server.streamable-http.mcp-endpoint=/sse