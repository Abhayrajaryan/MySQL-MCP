spring:
  application:
    name: mysql-mcp-server

  datasource:
    url: jdbc:mysql://localhost:3306/mysql_mcp?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 10000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

# Application-specific configuration
mysql-mcp:
  execution:
    max-rows: 1000
    query-timeout-seconds: 30
    max-query-length: 10000
  connection:
    timeout-seconds: 10

# Encryption key for database passwords (must be 16/24/32 bytes for AES)
app:
  encryption:
    key: "CHANGE-ME-32-CHAR-SECRET-KEY!!"